name: Release

on:
  # Auto-release after CI passes on main
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  # Manual override to force a specific bump type
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type (leave empty to auto-detect from commits)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  # ── 1. Bump version, generate changelog, tag ──────────────────────────────
  bump-and-tag:
    # Skip if triggered by workflow_run and CI failed
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
      changelog: ${{ steps.changelog.outputs.changelog }}
      should_release: ${{ steps.bump.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Bump version in Cargo.toml
        id: bump
        run: |
          current=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          last_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          # Skip if the latest commit is already a release commit (avoid loops)
          last_msg=$(git log -1 --pretty=format:%s)
          if echo "$last_msg" | grep -qE '^chore: release v'; then
            echo "Last commit is a release commit — skipping."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "version=${current}" >> "$GITHUB_OUTPUT"
            echo "tag=v${current}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Skip if no commits since last tag (when auto-triggered)
          if [ -n "$last_tag" ] && [ -z "$(git log ${last_tag}..HEAD --oneline --no-merges)" ]; then
            echo "No new commits since ${last_tag} — skipping."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "version=${current}" >> "$GITHUB_OUTPUT"
            echo "tag=v${current}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Auto-detect bump type from conventional commits (unless manually specified)
          manual_bump="${{ inputs.bump }}"
          if [ -n "$manual_bump" ]; then
            bump_type="$manual_bump"
          else
            if [ -n "$last_tag" ]; then
              log=$(git log "${last_tag}..HEAD" --pretty=format:%s --no-merges)
            else
              log=$(git log --pretty=format:%s --no-merges)
            fi
            if echo "$log" | grep -qE '(BREAKING CHANGE|!:)'; then
              bump_type="major"
            elif echo "$log" | grep -qE '^feat(\(.*\))?:'; then
              bump_type="minor"
            else
              bump_type="patch"
            fi
          fi
          echo "Detected bump type: ${bump_type}"

          IFS='.' read -r major minor patch <<< "$current"
          case "$bump_type" in
            major) major=$((major+1)); minor=0; patch=0 ;;
            minor) minor=$((minor+1)); patch=0 ;;
            patch) patch=$((patch+1)) ;;
          esac
          version="${major}.${minor}.${patch}"
          sed -i "s/^version = \"${current}\"/version = \"${version}\"/" Cargo.toml
          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"

      - name: Update Cargo.lock
        run: cargo update --workspace

      - name: Generate changelog
        id: changelog
        run: |
          last_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$last_tag" ]; then
            range="HEAD"
            log_cmd="git log --pretty=format:%s|||%H --no-merges"
          else
            range="${last_tag}..HEAD"
            log_cmd="git log ${last_tag}..HEAD --pretty=format:%s|||%H --no-merges"
          fi

          feats="" fixes="" refactors="" docs="" chores="" others=""

          while IFS='|||' read -r subject sha; do
            short="${sha:0:7}"
            line="- ${subject} (\`${short}\`)"
            case "$subject" in
              feat:*)    feats="${feats}${line}\n" ;;
              fix:*)     fixes="${fixes}${line}\n" ;;
              refactor:*) refactors="${refactors}${line}\n" ;;
              docs:*)    docs="${docs}${line}\n" ;;
              chore:*)   chores="${chores}${line}\n" ;;
              *)         others="${others}${line}\n" ;;
            esac
          done < <(eval "$log_cmd")

          body=""
          [ -n "$feats" ]     && body="${body}### Features\n${feats}\n"
          [ -n "$fixes" ]     && body="${body}### Bug Fixes\n${fixes}\n"
          [ -n "$refactors" ] && body="${body}### Refactoring\n${refactors}\n"
          [ -n "$docs" ]      && body="${body}### Documentation\n${docs}\n"
          [ -n "$chores" ]    && body="${body}### Chores\n${chores}\n"
          [ -n "$others" ]    && body="${body}### Other Changes\n${others}\n"
          [ -z "$body" ]      && body="- Initial release\n"

          printf "changelog<<EOF\n%b\nEOF" "$body" >> "$GITHUB_OUTPUT"

      - name: Update CHANGELOG.md
        run: |
          version="${{ steps.bump.outputs.version }}"
          date=$(date +%Y-%m-%d)
          changelog="${{ steps.changelog.outputs.changelog }}"

          # Build new release section
          new_section="## [${version}] - ${date}\n\n${changelog}"

          # Insert after the [Unreleased] line and update comparison links
          awk -v section="$new_section" -v ver="$version" '
            /^## \[Unreleased\]/ {
              print
              print ""
              printf "%s\n", section
              next
            }
            /^\[Unreleased\]:/ {
              printf "[Unreleased]: https://github.com/WolfCanCode/Codryn/compare/v%s...HEAD\n", ver
              printf "[%s]: https://github.com/WolfCanCode/Codryn/compare/", ver
              # find previous version tag from this line if it exists
              next
            }
            { print }
          ' CHANGELOG.md > CHANGELOG.tmp

          # Rebuild comparison links at bottom cleanly
          python3 - <<PYEOF
          import re

          with open("CHANGELOG.md") as f:
              content = f.read()

          with open("CHANGELOG.tmp") as f:
              tmp = f.read()

          # Extract all [x.y.z] version headers in order
          versions = re.findall(r'^## \[(\d+\.\d+\.\d+)\]', tmp, re.MULTILINE)
          versions = ["$version"] + [v for v in versions if v != "$version"]

          # Strip existing link definitions
          tmp = re.sub(r'\n\[Unreleased\]:.*', '', tmp)
          tmp = re.sub(r'\n\[\d+\.\d+\.\d+\]:.*', '', tmp)
          tmp = tmp.rstrip()

          # Build link section
          links = []
          links.append(f"[Unreleased]: https://github.com/WolfCanCode/Codryn/compare/v{versions[0]}...HEAD")
          for i, v in enumerate(versions):
              if i + 1 < len(versions):
                  links.append(f"[{v}]: https://github.com/WolfCanCode/Codryn/compare/v{versions[i+1]}...v{v}")
              else:
                  links.append(f"[{v}]: https://github.com/WolfCanCode/Codryn/releases/tag/v{v}")

          with open("CHANGELOG.md", "w") as f:
              f.write(tmp + "\n\n" + "\n".join(links) + "\n")
          PYEOF
          rm -f CHANGELOG.tmp

      - name: Commit version bump and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock CHANGELOG.md
          git commit -m "chore: release v${{ steps.bump.outputs.version }}"
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin main
          git push origin "v${{ steps.bump.outputs.version }}"

  # ── 2. Build release binaries (matrix) ────────────────────────────────────
  build:
    needs: bump-and-tag
    if: needs.bump-and-tag.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: codryn-linux-x86_64.tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset: codryn-linux-aarch64.tar.gz
            cross_linker: aarch64-linux-gnu-gcc
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: codryn-macos-x86_64.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: codryn-macos-aarch64.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-and-tag.outputs.tag }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compile linker (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.cross_linker }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Sign binary (macOS)
        if: runner.os == 'macOS'
        run: codesign --sign - "target/${{ matrix.target }}/release/codryn" 2>/dev/null || true

      - name: Package
        run: |
          tar -czf "${{ matrix.asset }}" \
            -C "target/${{ matrix.target }}/release" codryn

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          retention-days: 1

  # ── 3. Create GitHub release with binaries + changelog ────────────────────
  release:
    needs: [bump-and-tag, build]
    if: needs.bump-and-tag.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump-and-tag.outputs.tag }}
          name: ${{ needs.bump-and-tag.outputs.tag }}
          body: |
            ${{ needs.bump-and-tag.outputs.changelog }}

            ---

            ## Install / Upgrade

            ```sh
            curl -fsSL https://raw.githubusercontent.com/WolfCanCode/Codryn/main/install.sh | sh
            ```

            Or download a binary directly from the assets below.
          files: artifacts/*
          draft: false
          prerelease: false
