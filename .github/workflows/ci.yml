name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  rust-checks:
    runs-on: ubuntu-latest
    env:
      SKIP_UI_BUILD: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --all
